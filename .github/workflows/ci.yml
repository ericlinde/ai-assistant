# Runs on every pull request and push to main.
# No secrets required — all checks are local/static.
# To run the same checks locally: bash scripts/tests/run-all.sh
name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y shellcheck
          pip install jsonschema

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Run all checks
        run: bash scripts/tests/run-all.sh
