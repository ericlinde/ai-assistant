---
- name: Create /opt/agent directory
  ansible.builtin.file:
    path: /opt/agent
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"

- name: Sync repo files to /opt/agent
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../"
    dest: /opt/agent/
    delete: true
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=.env"
      - "--exclude=.token"
      - "--exclude=.client_id"
      - "--exclude=.client_secret"
      - "--exclude=infra/terraform/"
      - "--exclude=*.tfstate"
      - "--exclude=*.tfstate.backup"

- name: Install Infisical CLI apt repository
  ansible.builtin.shell: |
    curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | bash
  args:
    creates: /etc/apt/sources.list.d/infisical-infisical-cli.list

- name: Install Infisical CLI
  ansible.builtin.apt:
    name: infisical
    state: present
    update_cache: true

- name: Write Infisical Universal Auth client ID to /opt/agent/.client_id
  ansible.builtin.copy:
    content: "{{ vault_infisical_client_id }}"
    dest: /opt/agent/.client_id
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"

- name: Write Infisical Universal Auth client secret to /opt/agent/.client_secret
  ansible.builtin.copy:
    content: "{{ vault_infisical_client_secret }}"
    dest: /opt/agent/.client_secret
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"

- name: Run deploy.sh (validate, pull, start services, import workflows)
  ansible.builtin.command: bash /opt/agent/scripts/deploy.sh
  args:
    chdir: /opt/agent
  changed_when: true
  environment:
    PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    INFISICAL_CLIENT_ID: "{{ vault_infisical_client_id }}"
    INFISICAL_CLIENT_SECRET: "{{ vault_infisical_client_secret }}"
